spring.application.name=translateserver

# Cấu hình kết nối Database MySQL (Laragon)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/translateserver?useSSL=false&serverTimezone=UTC&useLegacyDatetimeCode=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Cấu hình Hibernate JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Tạm thời loại trừ auto-configuration của Google GenAI để tránh lỗi thiếu API Key khi start-up
spring.autoconfigure.exclude=org.springframework.ai.model.google.genai.autoconfigure.chat.GoogleGenAiChatAutoConfiguration

# Cấu hình API Key cho Gemini (sẽ đọc từ biến môi trường GEMINI_API_KEY)
spring.ai.google.genai.api-key=${GEMINI_API_KEY:}

# Cấu hình port của server Spring Boot sang 8081 để tránh trùng với Apache của Laragon (8080)
server.port=8081

# Cấu hình Model Gemini sử dụng (mặc định là gemini-2.5-flash)
spring.ai.google.genai.model=gemini-2.5-flash
spring.ai.google.genai.fallback-model=gemini-3.5-flash
